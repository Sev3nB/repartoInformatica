<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ITT G. Giorgi - Informatica{% endblock title %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <header class="topbar">
        <div class="logo">
            <div class="logo-circle">
                <img src="{{ url_for('static', filename='images/logo_giorgi.png') }}" alt="Logo ITT Giorgi">
            </div>
            <span>ITT G. GIORGI</span>
        </div>
        <nav>
            <a href="{{ url_for('home') }}" class="{% if request.endpoint == 'home' %}active{% endif %}">Home</a>
            <a href="{{ url_for('progetti') }}"
                class="{% if request.endpoint == 'progetti' %}active{% endif %}">Progetti</a>
            <a href="{{ url_for('competizioni') }}"
                class="{% if request.endpoint == 'competizioni' %}active{% endif %}">Competizioni</a>
            <a href="{{ url_for('contatti') }}"
                class="{% if request.endpoint == 'contatti' %}active{% endif %}">Contatti</a>
        </nav>
    </header>

    {% block content %}{% endblock content %}

    <footer>
        <p>&copy; 2026 ITT G. Giorgi - Dipartimento di Informatica. Tutti i diritti riservati.</p>
    </footer>
</body>

</html>
